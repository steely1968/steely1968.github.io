<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fencing Calculator</title>
<style>
body { font-family: Arial; padding: 20px; max-width: 500px; }
label { display: block; margin-top: 10px; }
input, select { width: 100%; padding: 6px; margin-top: 4px; }
h2 { margin-top: 20px; }
</style>
</head>
<body>

<h1>Fencing Installation Calculator</h1>

<label>Total Fence Length (meters)
<input type="number" id="length" value="10">
</label>

<label>Fence Height
<select id="height">
<option value="3">3 ft</option>
<option value="4">4 ft</option>
<option value="5">5 ft</option>
<option value="6">6 ft</option>
<option value="7">7 ft</option>
</select>
</label>

<label>Gate Width (mm) (0 if none)
<input type="number" id="gateWidth" value="0">
</label>

<h2>Total Price: £<span id="total">0.00</span></h2>

<script>
function calculate() {
let length = parseFloat(document.getElementById("length").value) || 0;
let height = parseInt(document.getElementById("height").value);
let gateWidthMM = parseFloat(document.getElementById("gateWidth").value) || 0;

// Convert gate width mm → meters
let gateWidthM = gateWidthMM / 1000;

// Deduct gate from total length
let adjustedLength = length - gateWidthM;
if (adjustedLength < 0) adjustedLength = 0;

// Each panel = 1.8m
let panels = Math.ceil(adjustedLength / 1.8);

// Posts = panels + 1
let posts = panels + 1;

// Post mix (2 per post)
let postMixBags = posts * 2;

// Gravel boards = panels
let gravelBoards = panels;

// Panel pricing (height minus gravel board)
let panelHeight = height - 1;

let panelPrices = {
2: 25,
3: 28,
4: 32,
5: 37,
6: 42
};

let panelCost = panelPrices[panelHeight] || 0;

// Costs
let totalPanelsCost = panels * panelCost;
let totalPostsCost = posts * 20.70;
let totalPostMixCost = postMixBags * 5.50;
let totalGravelCost = gravelBoards * 18;

// Gate cost (£1.5 per mm)
let gateCost = gateWidthMM * 1.5;

// Labour (£54 per meter, excluding gate width)
let labourCost = adjustedLength * 54;

let total = totalPanelsCost + totalPostsCost + totalPostMixCost + totalGravelCost + gateCost + labourCost;

document.getElementById("total").innerText = total.toFixed(2);
}

// Live updates
document.querySelectorAll("input, select").forEach(el => {
el.addEventListener("input", calculate);
});

calculate();
</script>

</body>
</html>
