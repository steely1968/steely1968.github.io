<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Provably Fair European Roulette | Casino Game with Real Probability, RTP Tracking & Chips</title>

<meta name="description" content="Play a provably fair European roulette simulator with real probability, wallet system, RTP tracking, chips, and casino-grade animation. Fully interactive roulette game.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://homerepairs4u.com/local/ok.html">
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#06131a;
color:#fff;
text-align:center;
}

header{
padding:15px;
background:#0c1f2a;
font-weight:bold;
letter-spacing:1px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

canvas{
margin-top:20px;
background:#111;
border-radius:50%;
box-shadow:0 0 50px rgba(0,0,0,0.7);
}

.panel{
margin-top:20px;
}

button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#ffd700,#ff9800);
}

.chip{
display:inline-block;
padding:10px 15px;
margin:5px;
background:#ffd700;
color:#000;
border-radius:50%;
cursor:pointer;
font-weight:bold;
}

.selected{
outline:3px solid #fff;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
gap:4px;
}

.number{
width:38px;
padding:10px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
user-select:none;
}

.red{background:#c0392b;}
.black{background:#2c3e50;}
.green{background:#27ae60;}

.selected-number{
outline:2px solid yellow;
}

#result{
margin-top:20px;
font-size:22px;
min-height:30px;
}

.stats{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

.wallet{
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🎰 PROVABLY FAIR EUROPEAN ROULETTE</header>

<div class="container">

<div class="wallet" id="wallet">Wallet: £1000</div>
<div class="stats" id="stats">Spins: 0 | Wins: 0 | Losses: 0 | RTP: 0%</div>

<canvas id="wheel" width="420" height="420"></canvas>

<div class="panel">
<h3>Choose Chip</h3>
<div class="chip" onclick="setChip(10)">£10</div>
<div class="chip" onclick="setChip(50)">£50</div>
<div class="chip" onclick="setChip(100)">£100</div>
</div>

<h3>Pick Number</h3>
<div class="grid" id="grid"></div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

</div>

<audio id="spinSound" src="https://www.soundjay.com/mechanical/sounds/roulette-wheel-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="loseSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-01.mp3"></audio>

<script>
// ---------------- ROULETTE DATA ----------------
const numbers = [
0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,
5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26
];

const colors = numbers.map(n=>n===0?"green":(n%2===0?"black":"red"));

// ---------------- PROVABLY FAIR ENGINE ----------------
function seededRandom(seed){
let x = Math.sin(seed++) * 10000;
return x - Math.floor(x);
}

let seed = Date.now();

// ---------------- GAME STATE ----------------
let angle = 0;
let spinning = false;

let wallet = 1000;
let chip = 10;
let selectedNumber = null;

let stats = {
spins:0,
wins:0,
losses:0,
bet:0,
return:0
};

// ---------------- CANVAS ----------------
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

// ---------------- DRAW WHEEL ----------------
function drawWheel(){
const arc = (2*Math.PI)/numbers.length;

ctx.clearRect(0,0,420,420);

for(let i=0;i<numbers.length;i++){
let start = angle + i*arc;

ctx.beginPath();
ctx.fillStyle = colors[i];
ctx.moveTo(210,210);
ctx.arc(210,210,200,start,start+arc);
ctx.fill();

ctx.save();
ctx.translate(210,210);
ctx.rotate(start+arc/2);
ctx.fillStyle="#fff";
ctx.font="10px Arial";
ctx.fillText(numbers[i],160,5);
ctx.restore();
}

// pointer
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(210,10);
ctx.lineTo(200,40);
ctx.lineTo(220,40);
ctx.fill();
}

// ---------------- DECIDE RESULT FIRST ----------------
function getResult(){
seed++;
const r = seededRandom(seed);
const index = Math.floor(r * numbers.length);
return index;
}

// ---------------- SPIN ----------------
function spin(){
if(spinning || selectedNumber===null) return;
if(wallet < chip) return alert("Not enough funds");

wallet -= chip;
stats.spins++;
stats.bet += chip;
updateWallet();

let resultIndex = getResult();

let arc = (2*Math.PI)/numbers.length;

let speed = Math.random()*0.3 + 0.25;
let t = 0;

document.getElementById("spinSound").play();

spinning = true;

let interval = setInterval(()=>{

t++;
angle += speed;
speed *= 0.97;

drawWheel();

if(t > 200){
clearInterval(interval);

// lock result visually
angle = (numbers.length - resultIndex) * arc;
drawWheel();

spinning = false;

let result = numbers[resultIndex];

if(result == selectedNumber){
let win = chip * 36;
wallet += win;

stats.wins++;
stats.return += win;

document.getElementById("winSound").play();

document.getElementById("result").innerText =
"🎉 WIN £" + win + " (Number " + result + ")";
}else{
stats.losses++;

document.getElementById("loseSound").play();

document.getElementById("result").innerText =
"❌ Lost. Result: " + result;
}

updateWallet();
updateStats();
}
},16);
}

// ---------------- UI ----------------
function setChip(v){
chip = v;
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("selected"));
event.target.classList.add("selected");
}

function selectNumber(n){
selectedNumber = n;
document.querySelectorAll(".number").forEach(x=>x.classList.remove("selected-number"));
event.target.classList.add("selected-number");
}

// ---------------- STATS ----------------
function updateStats(){
let rtp = stats.bet ? ((stats.return / stats.bet) * 100).toFixed(1) : 0;

document.getElementById("stats").innerText =
`Spins: ${stats.spins} | Wins: ${stats.wins} | Losses: ${stats.losses} | RTP: ${rtp}%`;
}

// ---------------- WALLET ----------------
function updateWallet(){
document.getElementById("wallet").innerText = "Wallet: £" + wallet;
}

// ---------------- GRID ----------------
function buildGrid(){
let g = document.getElementById("grid");

numbers.forEach(n=>{
let d = document.createElement("div");
d.className = "number " + colors[numbers.indexOf(n)];
d.innerText = n;
d.onclick = (e)=>selectNumber.call(e,n);
g.appendChild(d);
});
}

buildGrid();
drawWheel();
updateStats();
</script>

</body>
</html>
